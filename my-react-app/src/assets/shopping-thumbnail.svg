    <circle cx="50" cy="90" r="8" fill="white"/>
    <circle cx="80" cy="90" r="8" fill="white"/>
    <line x1="40" y1="65" x2="40" y2="80" stroke="white" stroke-width="2"/>
    <line x1="70" y1="65" x2="70" y2="80" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Dollar signs -->
  <text x="80" y="200" font-size="40" fill="white" opacity="0.3" font-family="Arial, sans-serif">$</text>
  <text x="250" y="220" font-size="40" fill="white" opacity="0.3" font-family="Arial, sans-serif">$</text>
  
  <text x="200" y="340" font-size="26" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">
    E-Shopping
  </text>
  <text x="200" y="370" font-size="14" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-family="Arial, sans-serif">
