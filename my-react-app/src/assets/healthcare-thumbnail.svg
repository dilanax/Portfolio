<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#grad1)"/>
  
  <!-- Medical cross icon -->
  <g transform="translate(100, 80)">
    <circle cx="100" cy="80" r="60" fill="white" opacity="0.2"/>
    <rect x="85" y="50" width="30" height="60" fill="white" rx="5"/>
    <rect x="70" y="65" width="60" height="30" fill="white" rx="5"/>
  </g>
  
  <!-- Healthcare elements -->
  <circle cx="200" cy="200" r="80" fill="rgba(255,255,255,0.1)" stroke="white" stroke-width="2"/>
  <circle cx="200" cy="200" r="65" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  
  <!-- Heart icon -->
  <g transform="translate(200, 180)">
    <path d="M0,-20 Q-15,-35 -25,-25 Q-35,-15 -25,5 L0,25 L25,5 Q35,-15 25,-25 Q15,-35 0,-20" fill="white"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="340" font-size="28" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">
    Smart Healthcare
  </text>
  <text x="200" y="370" font-size="16" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-family="Arial, sans-serif">
    Spring Boot + React
  </text>
</svg>