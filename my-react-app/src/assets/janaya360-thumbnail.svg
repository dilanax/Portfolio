<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#grad2)"/>
  
  <!-- Network nodes -->
  <circle cx="120" cy="120" r="15" fill="white" opacity="0.9"/>
  <circle cx="280" cy="120" r="15" fill="white" opacity="0.9"/>
  <circle cx="200" cy="200" r="18" fill="white"/>
  <circle cx="120" cy="280" r="15" fill="white" opacity="0.9"/>
  <circle cx="280" cy="280" r="15" fill="white" opacity="0.9"/>
  
  <!-- Connection lines -->
  <line x1="120" y1="120" x2="200" y2="200" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="120" x2="200" y2="200" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="280" x2="200" y2="200" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="280" x2="200" y2="200" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="120" x2="120" y2="280" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="280" y1="120" x2="280" y2="280" stroke="white" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Center icon - Document/Transparency -->
  <g transform="translate(185, 185)">
    <rect x="0" y="0" width="30" height="30" fill="none" stroke="white" stroke-width="2" rx="3"/>
    <line x1="8" y1="10" x2="22" y2="10" stroke="white" stroke-width="1.5"/>
    <line x1="8" y1="17" x2="22" y2="17" stroke="white" stroke-width="1.5"/>
    <line x1="8" y1="24" x2="18" y2="24" stroke="white" stroke-width="1.5"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="340" font-size="24" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">
    Janaya360
  </text>
  <text x="200" y="370" font-size="16" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-family="Arial, sans-serif">
    MERN Platform
  </text>
